<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iframe 测试 — App Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="test-layout">
  <div class="test-toolbar">
    <a href="index.html">← 返回</a>
    <strong>Page 1: App Store</strong>
    <code>https://app.adoluna.com/store.html#store/1545626496</code>
    <button type="button" onclick="document.getElementById('test-iframe').src = document.getElementById('test-iframe').src">重新加载</button>
  </div>

  <div class="iframe-wrap">
    <iframe
      id="test-iframe"
      src="https://app.adoluna.com/store.html#store/1545626496"
      title="App Store"
      allow="fullscreen; geolocation; microphone; camera"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>
</body>
</html>
